<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariage de Avigael & Yoni</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #BFA466; --bg: #FFFEFA; --text: #5A5A5A; }
        body { font-family: 'Cormorant Garamond', serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; overflow-x: hidden; }
        .main-wrapper { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }
        
        /* Animation Pétales */
        #petals-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .petal { position: absolute; background: var(--gold); width: 8px; height: 12px; border-radius: 0 100% 0 100%; opacity: 0.5; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        .card, .mairie-wrapper { position: relative; padding: 50px 20px; background: #fff; border: 1px solid #EBE3D3; text-align: center; }
        h3 { font-size: 1.5rem; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .couple-names { font-family: 'Great Vibes', cursive; font-size: 2.6rem; color: var(--gold); margin: 10px 0; }
        
        /* DÉCORATIONS LATÉRALES */
        .deco-left, .deco-right { position: absolute; top: 0; bottom: 0; width: 40px; background-repeat: repeat-y; background-size: 100% auto; z-index: 0; pointer-events: none; }
        .deco-left { left: 0; background-image: url('gauche.png'); }
        .deco-right { right: 0; background-image: url('droite.png'); }
        
        .card-content { position: relative; z-index: 1; }

        /* CORNERS HOUPPA */
        .corner { position: absolute; width: 70px; z-index: 2; }
        .tr { top: 5px; right: 5px; } .tl { top: 5px; left: 5px; }
        .br { bottom: 5px; right: 5px; } .bl { bottom: 5px; left: 5px; }

        /* IMAGES */
        .phrase-img { width: 100%; border: none !important; display: block; margin: 10px 0; }
        .img-full { width: 100%; border: 1px solid #EBE3D3; margin: 10px 0; display: block; }
        
        /* BOUTONS */
        .btn-row { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { padding: 10px 15px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-size: 0.7rem; text-transform: uppercase; }
        
        /* FORMULAIRE */
        .form-group { text-align: left; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #EBE3D3; background: #fdfdfd; font-family: inherit; }
        .btn-submit { width: 100%; padding: 15px; background: var(--gold); color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="petals-container"></div>
<audio id="bg-music" src="musique.mp3" loop></audio>

<div class="main-wrapper">
    <section class="mairie-wrapper">
        <div class="deco-left"></div>
        <div class="deco-right"></div>
        <div class="card-content">
            <div style="font-size: 2rem; color: var(--gold);">⚭</div>
            <h3>Cérémonie Civile</h3>
            <div class="couple-names">Avigael & Yoni</div>
            <p><b>Mardi 27 Juillet 2026</b> à <b>10h30</b><br><b>Mairie du 17ᵉ arrondissement, Paris</b></p>
            <div class="btn-row">
                <a href="#" class="btn">📅 Bloquer</a>
                <a href="https://waze.com/ul?q=16-20+Rue+des+Batignolles+75017+Paris" class="btn">📍 Waze</a>
            </div>
        </div>
    </section>

    <section class="card">
        <img src="haut-droite.png" class="corner tr">
        <img src="bas-droite.png" class="corner tl">
        <img src="haut-gauche.png" class="corner br">
        <img src="bas-gauche.png" class="corner bl">
        <div class="card-content">
            <img src="phrase3.png" class="phrase-img">
            <img src="houppa.png" class="img-full">
            <h3>Houppa & Soirée</h3>
            <div class="couple-names">Avigael & Yoni</div>
            <p><b>Jeudi 30 Juillet 2026</b> à <b>17h30</b><br><b>Le Manoir des Cygnes, Le Coudray-Montceaux</b></p>
            <div class="btn-row">
                <a href="#" class="btn">📅 Bloquer</a>
                <a href="#" class="btn">📍 Waze</a>
            </div>
        </div>
    </section>

    <section class="card">
        <h3>Confirmations</h3>
        <form id="rsvpForm">
            <div class="form-group">
                <label>Nom & Prénoms</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Présent à la Mairie ?</label>
                <select onchange="document.getElementById('nb-m').style.display = this.value === 'oui' ? 'block' : 'none'">
                    <option value="non">Non</option>
                    <option value="oui">Oui</option>
                </select>
                <input type="number" id="nb-m" style="display:none; margin-top:10px;" placeholder="Nb personnes">
            </div>
            <div class="form-group">
                <label>Présent à la Houppa ?</label>
                <select onchange="document.getElementById('nb-h').style.display = this.value === 'oui' ? 'block' : 'none'">
                    <option value="non">Non</option>
                    <option value="oui">Oui</option>
                </select>
                <input type="number" id="nb-h" style="display:none; margin-top:10px;" placeholder="Nb personnes">
            </div>
            <button type="submit" class="btn-submit">Confirmer ma présence</button>
        </form>
    </section>
</div>

<script>
    // Animation Pétales
    function createPetal() {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = Math.random() * 5 + 5 + 's';
        document.getElementById('petals-container').appendChild(p);
        setTimeout(() => p.remove(), 10000);
    }
    setInterval(createPetal, 400);

    // Audio
    document.body.addEventListener('click', function() {
        const music = document.getElementById('bg-music');
        if (music.paused) music.play();
    }, { once: true });
</script>
</body>
</html>
